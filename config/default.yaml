data:
  raw_data: "data/QQQ_1min_adjusted.parquet"
  external_cache: "output/external_data.parquet"

splits:
  train_end: "2019-12-31"
  val_start: "2020-01-01"
  val_end: "2022-12-31"
  test_start: "2023-01-01"

model:
  base:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

  production:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.03
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.1
    reg_lambda: 1.0

thresholds:
  move_pcts: [0.01, 0.02, 0.03, 0.05]
  confidence: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8]

random_state: 42

prediction:
  default_model: "interaction"
  confidence_threshold: 0.5
